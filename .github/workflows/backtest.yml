name: Nautilus Backtest

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      start_date:
        description: "回测开始日期 (YYYY-MM-DD)"
        required: false
        default: "2024-01-01"
      end_date:
        description: "回测结束日期 (YYYY-MM-DD)"
        required: false
        default: "2026-06-30"

permissions:
  contents: read
  actions: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    
    env:
      START_DATE: ${{ github.event.inputs.start_date || '2024-01-01' }}
      END_DATE: ${{ github.event.inputs.end_date || '2026-06-30' }}
      DATA_ROOT: /data/crypto_data/ticks/BTCUSDT
      PYTHONPATH: ${{ github.workspace }}

    steps:
      # 1. Checkout 代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 缓存 pip wheel
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('nautilus_trader/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # 2. 安装 Python 3.12 (ubuntu-latest 自带 3.12)
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 直接安装自编译的 ARM64 wheel (从 GitHub Release assets 页面解析 HTML 找 .whl)
      - name: Install Nautilus Trader (custom ARM64 wheel)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --find-links https://github.com/crazysunday7-ctrl/storm-tang/releases/tag/nautilus-v1.221.0-arm64/ nautilus-trader==1.221.0

      # 验证导入
      - name: Verify Nautilus imports
        run: |
          python -c "
          from nautilus_trader.backtest.engine import BacktestEngine
          from nautilus_trader.config import BacktestEngineConfig
          from nautilus_trader.model.enums import AccountType, OmsType
          from nautilus_trader.model.identifiers import Venue, InstrumentId, Symbol
          from nautilus_trader.model.objects import Money, Price, Quantity
          from nautilus_trader.model.currencies import USDT, BTC
          from nautilus_trader.model.data import Bar, BarType, BarSpecification
          from nautilus_trader.model.instruments import CryptoPerpetual
          print('=== ALL IMPORTS OK ===')
          "

      # 3. 检查数据可用性 (Self-hosted Runner 才有数据)
      - name: Check data availability
        id: data_check
        run: |
          if [ -d "$DATA_ROOT" ] && [ -n "$(ls -A $DATA_ROOT/*.parquet 2>/dev/null)" ]; then
            echo "has_data=true" >> $GITHUB_OUTPUT
            echo "Data found at $DATA_ROOT"
          else
            echo "has_data=false" >> $GITHUB_OUTPUT
            echo "WARNING: No parquet data at $DATA_ROOT. Skipping backtest."
            echo "This workflow must run on self-hosted runner with data mounted at /data"
          fi

      # 4. 运行回测 (仅当数据存在时)
      - name: Run backtest
        if: steps.data_check.outputs.has_data == 'true'
        run: |
          /opt/venv/bin/python ${{ github.workspace }}/run_nautilus_backtest.py \
            --start ${{ env.START_DATE }} \
            --end ${{ env.END_DATE }}

      # 5. 上传回测结果
      - name: Upload results
        if: steps.data_check.outputs.has_data == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            ${{ github.workspace }}/backtest_results/*
            ${{ github.workspace }}/*.log
          retention-days: 30

      # 6. 上传安装验证日志
      - name: Upload install log
        uses: actions/upload-artifact@v4
        with:
          name: install-verification
          path: ${{ github.workspace }}/*.log
          retention-days: 7